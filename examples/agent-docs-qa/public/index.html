<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>milkie agent playground — 三国 Q&A</title>
  <style>
    :root {
      --bg: #f7f7f8;
      --panel: #ffffff;
      --border: #e5e5e7;
      --text: #1c1c1e;
      --muted: #6e6e73;
      --accent: #5b3ec9;
      --cite-bg: #f0eaff;
      --cite-fg: #5b3ec9;
      --skill-highlight: #fff4e0;
      --audit-w: clamp(440px, 44vw, 720px);
    }
    * { box-sizing: border-box }
    html, body { margin: 0; padding: 0; height: 100% }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", sans-serif;
      background: var(--bg); color: var(--text); font-size: 14px;
    }
    header {
      padding: 12px 20px; background: var(--panel); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 16px;
    }
    header h1 { margin: 0; font-size: 16px; font-weight: 600 }
    header .controls { margin-left: auto; display: flex; gap: 8px; align-items: center }
    header select, header button {
      font: inherit; padding: 4px 10px; border: 1px solid var(--border);
      border-radius: 4px; background: var(--panel); cursor: pointer;
    }
    header button { background: var(--accent); color: white; border-color: var(--accent) }
    header .dev-badge {
      font-size: 11px; color: var(--muted); padding: 2px 8px;
      border: 1px solid var(--border); border-radius: 999px; background: var(--bg);
    }

    /* ── Default (Layer 1: single-pane Answer view) ─────────────────── */
    main { display: flex; height: calc(100vh - 49px); justify-content: center; background: var(--bg) }
    #chat {
      flex: 0 1 760px; max-width: 760px; display: flex; flex-direction: column;
      background: var(--panel); border-left: 1px solid var(--border); border-right: 1px solid var(--border);
    }
    #chat-log { flex: 1; overflow-y: auto; padding: 24px 32px; display: flex; flex-direction: column; gap: 18px }
    .msg { padding: 10px 14px; border-radius: 10px; max-width: 92%; line-height: 1.6; white-space: pre-wrap }
    .msg.user      { background: #e8f0fe; align-self: flex-end }
    .msg.assistant { background: #f0f0f2; align-self: flex-start }
    .msg .speaker { font-size: 11px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em }
    .msg.assistant .body { display: block }
    .msg.assistant .sources-footer {
      display: block; margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(0,0,0,0.06);
      font-size: 12px; color: var(--muted);
    }
    .msg.assistant .sources-footer .src {
      display: inline-block; margin-right: 10px;
      font-family: ui-monospace, SFMono-Regular, monospace; color: var(--cite-fg);
    }
    .msg.assistant .audit-trigger {
      display: inline-block; margin-top: 8px; font-size: 12px; color: var(--accent);
      cursor: pointer; user-select: none;
    }
    /* Pending bubble while the agent is running. We don't know yet how
       long the turn will take or what tools it will call, so the bubble
       shows an animated "·  ·  ·" plus a live status line that the SSE
       handler updates as each tool/LLM step fires. */
    .msg.assistant.pending {
      color: var(--muted); font-style: italic;
    }
    .msg.assistant.pending .pending-dots::after {
      content: '·';
      animation: pendingDots 1.4s steps(4, end) infinite;
    }
    @keyframes pendingDots {
      0%   { content: '·' }
      25%  { content: '· ·' }
      50%  { content: '· · ·' }
      75%  { content: '· · · ·' }
      100% { content: '·' }
    }
    .msg.assistant.pending .pending-status {
      display: block; margin-top: 4px; font-size: 12px;
    }
    .msg.assistant .sources-footer + .audit-trigger { margin-top: 4px }
    .msg.assistant .audit-trigger:hover { text-decoration: underline }
    .msg.assistant .body strong { font-weight: 600 }
    .msg.assistant .body code {
      font-family: ui-monospace, SFMono-Regular, monospace; font-size: 0.92em;
      background: rgba(0,0,0,0.06); padding: 1px 5px; border-radius: 3px;
    }
    .msg.assistant .body .md-quote {
      display: inline; padding-left: 10px;
      border-left: 3px solid var(--accent); margin-left: 2px;
      color: #3a3a3d;
    }
    .msg.assistant .body .md-h { font-weight: 600; margin: .5em 0 .25em; line-height: 1.3 }
    .msg.assistant .body h1.md-h { font-size: 1.25em }
    .msg.assistant .body h2.md-h { font-size: 1.15em }
    .msg.assistant .body h3.md-h { font-size: 1.05em }
    .msg.assistant .body h4.md-h,
    .msg.assistant .body h5.md-h,
    .msg.assistant .body h6.md-h { font-size: 1em }
    .msg.assistant .body .md-list { margin: .25em 0; padding-left: 1.5em }
    .msg.assistant .body .md-list li { margin: .15em 0 }
    .cite {
      display: inline-block; cursor: pointer; user-select: none;
      color: var(--cite-fg); background: var(--cite-bg); border-radius: 4px;
      padding: 0 4px; margin: 0 1px; font-size: 0.72em; font-weight: 600;
      vertical-align: super; line-height: 1.4;
    }
    .cite:hover { background: #e1d5ff }
    #chat-input { display: flex; padding: 14px 20px; border-top: 1px solid var(--border); gap: 8px; background: var(--panel) }
    #chat-input input { flex: 1; padding: 9px 13px; font: inherit; border: 1px solid var(--border); border-radius: 6px }
    #chat-input input:disabled { background: #f5f5f7; color: var(--muted) }
    #chat-input button { padding: 9px 18px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font: inherit }
    #chat-input button:disabled { opacity: 0.5; cursor: not-allowed }

    /* ── Citation popover (anchored, dismissable) ───────────────────── */
    #cite-popover {
      position: absolute; z-index: 100; max-width: 320px;
      background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12); padding: 12px 14px;
      font-size: 13px; line-height: 1.5; display: none;
    }
    #cite-popover.open { display: block }
    #cite-popover .cp-source {
      font-family: ui-monospace, SFMono-Regular, monospace; font-size: 12px;
      color: var(--text); word-break: break-all;
    }
    #cite-popover .cp-line { color: var(--muted); margin-top: 4px; font-size: 11px }
    #cite-popover .cp-hint { color: var(--muted); margin-top: 8px; font-size: 11px; font-style: italic }

    /* ── Audit panel (Layer 2: per-message decision audit) ──────────── */
    #audit-panel {
      position: fixed; top: 49px; right: 0; bottom: 0; width: var(--audit-w); z-index: 90;
      background: var(--panel); border-left: 1px solid var(--border);
      box-shadow: -8px 0 24px rgba(0,0,0,0.06);
      display: flex; flex-direction: column;
      transform: translateX(100%); transition: transform 0.18s ease-out;
    }
    #audit-panel.open { transform: translateX(0) }
    /* When the audit panel is open, dock it: stop centering the chat, let it
       fill the freed left space, and reserve the panel's strip on the right. */
    body.audit-open main { justify-content: flex-start; padding-right: var(--audit-w) }
    body.audit-open #chat { flex: 1 1 auto; max-width: 880px }
    #audit-panel .ap-header {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 16px; border-bottom: 1px solid var(--border);
    }
    #audit-panel .ap-title { font-size: 13px; font-weight: 600; flex: 1; min-width: 0 }
    #audit-panel .ap-title .ap-title-q {
      display: block; font-size: 12px; font-weight: 400; color: var(--muted);
      margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    #audit-panel .ap-title .ap-title-q::before { content: '↳ '; color: var(--accent) }
    #audit-panel .ap-close {
      cursor: pointer; background: none; border: none; padding: 4px 8px;
      font-size: 18px; line-height: 1; color: var(--muted);
    }
    #audit-panel .ap-close:hover { color: var(--text) }
    /* Secondary (outline) action — Replay is a verification action, not the
       panel's primary operation, so it stays quiet. Filled emphasis is reserved
       for true primary actions (e.g. + 新对话). */
    #audit-panel .ap-replay {
      cursor: pointer; background: var(--bg); color: var(--text); border: 1px solid var(--border);
      padding: 4px 10px; border-radius: 6px; font: inherit; font-size: 11px;
      font-weight: 500;
    }
    #audit-panel .ap-replay:hover { opacity: 0.9 }
    #audit-panel .ap-replay:disabled { opacity: 0.5; cursor: progress }

    /* Replay result banner — sits above the tabs after a replay completes,
       summarizing whether the run reproduced bit-exact (deterministic) or
       diverged. Tabs and body remain accessible underneath. */
    #audit-panel .ap-replay-banner {
      display: none; padding: 10px 14px; border-bottom: 1px solid var(--border);
      font-size: 12px; line-height: 1.5; position: relative;
    }
    #audit-panel .ap-replay-banner.shown { display: block }
    #audit-panel .ap-replay-banner.deterministic { background: #f0faf3; border-left: 4px solid #2da14b }
    #audit-panel .ap-replay-banner.divergent     { background: #fdf2e6; border-left: 4px solid #e07a00 }
    #audit-panel .ap-replay-banner.error         { background: #fdf0f0; border-left: 4px solid #d93030 }
    #audit-panel .ap-replay-banner .rb-title {
      font-weight: 600; margin-bottom: 4px;
    }
    #audit-panel .ap-replay-banner.deterministic .rb-title { color: #2da14b }
    #audit-panel .ap-replay-banner.divergent     .rb-title { color: #c66800 }
    #audit-panel .ap-replay-banner.error         .rb-title { color: #c02020 }
    #audit-panel .ap-replay-banner .rb-detail { color: var(--text) }
    #audit-panel .ap-replay-banner .rb-meta { color: var(--muted); font-size: 11px; margin-top: 4px }
    #audit-panel .ap-replay-banner .rb-close {
      position: absolute; top: 6px; right: 10px; cursor: pointer;
      background: none; border: none; font-size: 14px; line-height: 1; color: var(--muted);
    }
    #audit-panel .ap-replay-banner .rb-close:hover { color: var(--text) }
    /* Diagnose verdict strip (#98): a persistent conclusion row between the
       header and the tabs — the "verdict" above the evidence (tabs). */
    #audit-panel .ap-verdict { display: none; margin: 8px 16px 0 }
    #audit-panel .ap-verdict.shown { display: block }
    #audit-panel .vd-row {
      display: flex; align-items: center; gap: 10px; padding: 8px 12px;
      border-radius: 6px; border-left: 4px solid var(--border); background: var(--bg); font-size: 13px;
    }
    #audit-panel .ap-verdict.ok      .vd-row { background: #f0faf3; border-left-color: #2da14b }
    #audit-panel .ap-verdict.suspect .vd-row { background: #fdf2e6; border-left-color: #e07a00 }
    #audit-panel .ap-verdict.error   .vd-row { background: #fdf0f0; border-left-color: #d93030 }
    #audit-panel .vd-label { font-weight: 600; color: var(--muted); white-space: nowrap }
    #audit-panel .vd-summary { flex: 1 }
    #audit-panel .vd-summary.toggle { cursor: pointer }
    #audit-panel .ap-verdict.ok      .vd-summary { color: #2da14b; font-weight: 600 }
    #audit-panel .ap-verdict.suspect .vd-summary { color: #c66800; font-weight: 600 }
    #audit-panel .ap-verdict.error   .vd-summary { color: #c02020; font-weight: 600 }
    #audit-panel .vd-run {
      padding: 4px 10px; font-size: 12px; cursor: pointer; white-space: nowrap;
      border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text);
    }
    #audit-panel .vd-run:hover { opacity: 0.9 }
    #audit-panel .vd-run:disabled { opacity: 0.5; cursor: progress }
    #audit-panel .vd-jump {
      margin-left: 6px; padding: 1px 8px; font-size: 12px; cursor: pointer;
      border: 1px solid #e0a060; border-radius: 10px; background: #fff7ee; color: #c66800;
    }
    #audit-panel .vd-jump:hover { background: #ffe9d2 }
    #audit-panel .vd-detail { margin: 6px 2px 0; font-size: 12px; color: var(--muted) }
    #audit-panel .vd-detail.collapsed { display: none }
    #audit-panel .vd-detail .vd-break { margin-top: 2px }
    #audit-panel .vd-detail .vd-break b { color: var(--text); font-weight: 600 }
    @keyframes stepFlash { 0% { background: #fff3d6 } 100% { background: transparent } }
    #audit-panel .ap-step.flash { animation: stepFlash 1.6s ease-out }
    #audit-panel .ap-tabs {
      display: flex; gap: 4px; padding: 0 12px; border-bottom: 1px solid var(--border); background: var(--bg);
    }
    #audit-panel .ap-tab {
      padding: 8px 12px; font-size: 12px; cursor: pointer; user-select: none;
      color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px;
    }
    #audit-panel .ap-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600 }
    #audit-panel .ap-tab.disabled { color: #c0c0c5; cursor: default }
    #audit-panel .ap-body { flex: 1; overflow-y: auto; padding: 14px 16px }
    #audit-panel .ap-body.viewer { padding: 0; overflow: hidden }
    #audit-panel .ap-viewer-frame { display: block; width: 100%; height: 100%; border: 0 }
    #audit-panel .ap-empty { color: var(--muted); font-style: italic; font-size: 12px; padding: 16px 0 }

    /* Sources tab */
    .ap-source-file {
      margin-bottom: 14px; padding: 10px 12px; background: var(--bg); border-radius: 6px;
    }
    .ap-source-file .sf-path {
      font-family: ui-monospace, SFMono-Regular, monospace; font-size: 12px;
      color: var(--cite-fg); word-break: break-all; margin-bottom: 6px;
    }
    .ap-source-file .sf-lines {
      font-size: 11px; color: var(--muted);
    }
    .ap-source-file .sf-lines .ln {
      display: inline-block; padding: 1px 6px; margin-right: 4px;
      background: var(--cite-bg); color: var(--cite-fg); border-radius: 3px;
      font-family: ui-monospace, SFMono-Regular, monospace;
    }

    /* Steps tab */
    .ap-step {
      position: relative; padding: 10px 12px 10px 28px; margin-bottom: 10px;
      background: var(--bg); border-radius: 6px; font-size: 12px; line-height: 1.5;
    }
    .ap-step .ap-step-num {
      position: absolute; left: 8px; top: 10px; width: 16px; height: 16px;
      border-radius: 50%; background: var(--accent); color: white;
      font-size: 10px; text-align: center; line-height: 16px; font-weight: 600;
    }
    .ap-step .ap-step-kind {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted);
      margin-bottom: 3px;
    }
    .ap-step .ap-step-body { color: var(--text) }
    .ap-step .ap-step-body code {
      font-family: ui-monospace, SFMono-Regular, monospace; font-size: 11px;
      background: var(--panel); padding: 1px 5px; border-radius: 3px;
      border: 1px solid var(--border);
    }
    .ap-step .ap-step-meta { color: var(--muted); font-size: 11px; margin-top: 4px }
    .ap-step.kind-llm .ap-step-num   { background: var(--accent) }
    .ap-step.kind-tool .ap-step-num  { background: #2563eb }

    /* Steps tab — cache badge + context composition expander.
       Both are substrate-derived signals: cache stats come from the
       llm.responded payload's prefix-cache snapshot; context composition
       comes from replaying region.added/removed up to the llm.requested. */
    .ap-step .ap-step-headerline { display: flex; align-items: baseline; gap: 8px; margin-bottom: 3px }
    .ap-step .ap-step-headerline .ap-step-kind { flex: 0 0 auto }
    .ap-step .ap-step-cache {
      margin-left: auto; font-size: 10px; font-weight: 600;
      padding: 2px 7px; border-radius: 10px;
      background: #e6f7ec; color: #2da14b;
    }
    .ap-step .ap-step-cache.cold { background: #fdecec; color: #c02020 }
    .ap-step .ap-step-cache.warm { background: #fdf4e0; color: #b8860b }
    .ap-step .ap-step-expand {
      display: inline-block; margin-top: 6px; font-size: 11px; color: var(--accent);
      cursor: pointer; user-select: none;
    }
    .ap-step .ap-step-expand:hover { text-decoration: underline }
    .ap-step .ap-step-expand::before { content: '▸ ' }
    .ap-step.expanded .ap-step-expand::before { content: '▾ ' }
    .ap-step .ap-step-expanded { display: none; margin-top: 8px }
    .ap-step.expanded .ap-step-expanded { display: block }
    .ap-region-group {
      margin-top: 8px; padding: 6px 8px; background: var(--panel); border-radius: 4px;
      border: 1px solid var(--border);
    }
    .ap-region-group .rg-title {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--muted); margin-bottom: 4px;
    }
    .ap-region-row {
      display: block; padding: 4px 0; font-size: 11px;
      border-top: 1px solid rgba(0,0,0,0.04);
    }
    .ap-region-row:first-child { border-top: none; padding-top: 0 }
    .ap-region-row .rr-id {
      display: block;
      font-family: ui-monospace, SFMono-Regular, monospace;
      color: var(--text); word-break: break-all;
    }
    .ap-region-row .rr-meta {
      display: block; color: var(--muted); margin-top: 1px;
    }
    /* A region's *content* doesn't live on the region.added event (which
       only records metadata). For a handful of well-known regions whose
       content is recoverable elsewhere — the current-turn region's
       content is the user's input, available from agent.run.started —
       we surface a preview line so the user can see what's actually in
       that slot. */
    .ap-region-row .rr-preview {
      display: block; margin-top: 4px; padding: 5px 8px;
      background: var(--cite-bg); border-left: 2px solid var(--accent);
      border-radius: 2px; font-size: 11px; color: var(--text);
      white-space: pre-wrap; word-break: break-word;
    }
    .ap-region-empty { color: var(--muted); font-style: italic; font-size: 11px; padding: 4px 0 }

    /* Step details — native <details>/<summary> for the second per-card
       expander (prompt+response for LLM, full input+output for tool).
       Using <details> gets us free click/keyboard toggle without another
       JS handler; we restyle the disclosure widget for visual parity
       with the existing "N regions in context" expander above. */
    .ap-step details.ap-step-details {
      margin-top: 6px;
    }
    .ap-step details.ap-step-details > summary {
      cursor: pointer; user-select: none; list-style: none;
      font-size: 11px; color: var(--accent);
    }
    .ap-step details.ap-step-details > summary::-webkit-details-marker { display: none }
    .ap-step details.ap-step-details > summary::before { content: '▸ ' }
    .ap-step details.ap-step-details[open] > summary::before { content: '▾ ' }
    .ap-step details.ap-step-details > summary:hover { text-decoration: underline }
    .ap-step details.ap-step-details .ap-sub {
      margin-top: 8px;
    }
    .ap-step details.ap-step-details .ap-sub-title {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--muted); margin-bottom: 4px;
    }
    .ap-json {
      display: block; margin: 0; padding: 8px 10px; max-height: 240px; overflow: auto;
      background: #1c1c1e; color: #f5f5f7; border-radius: 4px;
      font-family: ui-monospace, SFMono-Regular, monospace; font-size: 11px;
      line-height: 1.45; white-space: pre-wrap; word-break: break-all;
    }
    .ap-json.empty {
      background: var(--panel); color: var(--muted); font-style: italic; padding: 4px 10px;
    }

    /* Message mini-cards inside the LLM prompt expander */
    .ap-msg-card {
      margin-bottom: 6px; padding: 6px 10px; background: var(--panel);
      border: 1px solid var(--border); border-radius: 4px; font-size: 11px;
    }
    .ap-msg-card .mc-role {
      display: inline-block; padding: 1px 6px; border-radius: 3px;
      font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
      margin-right: 6px; color: white;
    }
    .ap-msg-card.role-system .mc-role    { background: #5b3ec9 }
    .ap-msg-card.role-user .mc-role      { background: #2563eb }
    .ap-msg-card.role-assistant .mc-role { background: #2da14b }
    .ap-msg-card.role-tool .mc-role,
    .ap-msg-card.role-tool_result .mc-role { background: #b8860b }
    .ap-msg-card .mc-preview {
      color: var(--text); white-space: pre-wrap; word-break: break-word;
      max-height: 5.6em; overflow: hidden; position: relative;
    }
    .ap-msg-card.expanded .mc-preview { max-height: none }
    .ap-msg-card .mc-more {
      display: block; margin-top: 4px; font-size: 10px; color: var(--accent);
      cursor: pointer; user-select: none;
    }
    .ap-msg-card .mc-more:hover { text-decoration: underline }

    /* Provenance tab — color-coded answer segments by source backing.
       Left border ribbon is the dominant visual: green = supported by
       direct quote in source, yellow = paraphrase with citation, orange
       = citation present but quoted text doesn't appear in source
       (possible hallucinated quote), red = no source citation at all,
       gray = couldn't fetch source to verify. */
    .ap-seg {
      padding: 10px 12px; margin-bottom: 8px; border-radius: 4px;
      border-left: 4px solid; background: var(--panel);
      font-size: 13px; line-height: 1.6;
    }
    .ap-seg .ap-seg-text { white-space: pre-wrap; word-break: break-word }
    .ap-seg .ap-seg-label {
      display: block; margin-top: 6px; font-size: 11px; font-weight: 600;
      letter-spacing: 0.04em; text-transform: uppercase;
    }
    .ap-seg .ap-seg-meta { display: block; margin-top: 3px; font-size: 11px; color: var(--muted) }
    .ap-seg.s-supported   { border-color: #2da14b; background: #f0faf3 }
    .ap-seg.s-supported   .ap-seg-label { color: #2da14b }
    .ap-seg.s-paraphrased { border-color: #d4a017; background: #fdf8ec }
    .ap-seg.s-paraphrased .ap-seg-label { color: #b8860b }
    .ap-seg.s-misattributed { border-color: #3b6fd4; background: #eef3fc }
    .ap-seg.s-misattributed .ap-seg-label { color: #2c54a8 }
    .ap-seg.s-tenuous     { border-color: #e07a00; background: #fdf2e6 }
    .ap-seg.s-tenuous     .ap-seg-label { color: #c66800 }
    .ap-seg.s-unsupported { border-color: #d93030; background: #fdf0f0 }
    .ap-seg.s-unsupported .ap-seg-label { color: #c02020 }
    .ap-seg.s-unverified  { border-color: #b0b0b5; background: var(--bg) }
    .ap-seg.s-unverified  .ap-seg-label { color: var(--muted) }
    .ap-seg .ap-seg-quote {
      display: block; margin-top: 6px; padding: 6px 10px; border-radius: 3px;
      background: rgba(0,0,0,0.04); font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 11px; color: var(--text); white-space: pre-wrap;
      max-height: 80px; overflow: auto;
    }
    .ap-prov-legend {
      margin-bottom: 12px; padding: 8px 10px; background: var(--bg); border-radius: 4px;
      font-size: 11px; color: var(--muted); line-height: 1.5;
    }
    .ap-prov-legend .lg-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin: 0 4px 0 8px; vertical-align: middle }
    .ap-prov-legend .lg-dot.s-supported   { background: #2da14b }
    .ap-prov-legend .lg-dot.s-paraphrased { background: #d4a017 }
    .ap-prov-legend .lg-dot.s-misattributed { background: #3b6fd4 }
    .ap-prov-legend .lg-dot.s-tenuous     { background: #e07a00 }
    .ap-prov-legend .lg-dot.s-unsupported { background: #d93030 }
    .ap-prov-legend .lg-dot.s-unverified  { background: #b0b0b5 }

    /* ── Dev mode (Layer 3: substrate inspector) ────────────────────── */
    body.dev-mode main { justify-content: stretch }
    body.dev-mode #chat { flex: 1 1 50%; max-width: none; border-right: 1px solid var(--border) }
    body.dev-mode #trace { display: flex }
    body.dev-mode .dev-badge { display: inline-block }
    body:not(.dev-mode) #trace { display: none }
    body:not(.dev-mode) .dev-badge { display: none }

    #trace { flex: 1 1 50%; display: flex; flex-direction: column; background: var(--bg) }
    #trace-header { padding: 8px 16px; background: var(--panel); border-bottom: 1px solid var(--border); font-size: 12px; color: var(--muted) }
    #trace-timeline { flex: 1; overflow-y: auto; padding: 12px }
    .entry {
      padding: 6px 12px; margin-bottom: 4px; background: var(--panel); border-radius: 4px;
      border: 1px solid transparent; cursor: pointer; font-family: ui-monospace, SFMono-Regular, monospace; font-size: 12px;
      transition: background 0.2s ease, border-color 0.2s ease;
    }
    .entry:hover { border-color: var(--border) }
    .entry.skill-loaded { background: var(--skill-highlight); border-color: #f0c060; font-weight: 600 }
    .entry .icon { display: inline-block; width: 16px; color: var(--accent) }
    .entry.tool .icon { color: #2563eb }
    .entry.lifecycle .icon { color: var(--muted) }
    .entry .ts { color: var(--muted); margin-left: 8px; font-size: 11px }

    #payload-detail {
      max-height: 35vh; overflow-y: auto; padding: 12px;
      background: #1c1c1e; color: #f5f5f7;
      font-family: ui-monospace, monospace; font-size: 11px; white-space: pre-wrap;
      border-top: 1px solid var(--border);
    }
    #payload-detail:empty { display: none }
  </style>
  <!-- OpenCC 繁→简 bundle. Loaded before the inline script (which runs at end
       of <body>) so provenance matching can normalize 繁/简 before comparing
       model quotes to the traditional corpus. Degrades to exact match if absent. -->
  <script src="/vendor/opencc-t2cn.js"></script>
</head>
<body>
  <header>
    <h1>milkie agent playground — 三国 Q&A</h1>
    <div class="controls">
      <span class="dev-badge">开发模式</span>
      <select id="conversation-picker">
        <option value="">(新对话)</option>
      </select>
      <button id="new-chat">+ 新对话</button>
    </div>
  </header>
  <main>
    <section id="chat">
      <div id="chat-log"></div>
      <form id="chat-input">
        <input type="text" placeholder="问《三国演义》相关问题..." autocomplete="off" />
        <button type="submit">发送</button>
      </form>
    </section>
    <section id="trace">
      <div id="trace-header">Trace 时间线</div>
      <div id="trace-timeline"></div>
      <div id="payload-detail"></div>
    </section>
  </main>
  <div id="cite-popover" role="dialog" aria-label="引用来源"></div>
  <aside id="audit-panel" role="dialog" aria-label="决策审计">
    <div class="ap-header">
      <div class="ap-title">这个答案是怎么来的</div>
      <button class="ap-replay" aria-label="确定性重放本轮" title="从记录的 trace 确定性地重跑这一轮">↻ 重放</button>
      <button class="ap-close" aria-label="关闭审计面板">×</button>
    </div>
    <div class="ap-replay-banner" role="status"></div>
    <div class="ap-verdict" role="status"></div>
    <div class="ap-tabs">
      <div class="ap-tab active" data-tab="sources">来源</div>
      <div class="ap-tab" data-tab="steps">执行</div>
      <div class="ap-tab" data-tab="provenance">溯源</div>
      <div class="ap-tab" data-tab="why">归因</div>
    </div>
    <div class="ap-body"></div>
  </aside>

  <script>
  (function () {
    // ─── State ─────────────────────────────────────────────────────────
    const urlParams         = new URLSearchParams(location.search)
    let currentContextId    = urlParams.get('context') || null
    const isDev             = urlParams.get('dev') === '1'
    let eventSource         = null
    let seenEventIds        = new Set()
    // Full event objects bucketed by runId, so the audit panel can
    // reconstruct any turn's decision flow without re-fetching.
    let eventsByRunId       = new Map()
    // Anchor of the currently-open audit panel (the assistant bubble it
    // describes), or null if closed. Used to toggle re-clicks.
    let auditAnchorRunId    = null
    let auditActiveTab      = 'sources'
    // Raw assistant text per runId, kept so the Provenance tab can re-
    // segment the answer rather than parse it back out of the rendered
    // DOM (which has already been esc()'d and citation-substituted).
    const assistantTextByRunId = new Map()
    // file+lineRange → fetched source slice, so opening Provenance for a
    // message with 10 citations doesn't hit the server 10 times if the
    // same source is referenced multiple times.
    const sourceCache       = new Map()

    if (isDev) document.body.classList.add('dev-mode')

    // ─── DOM ───────────────────────────────────────────────────────────
    const $log     = document.getElementById('chat-log')
    const $input   = document.querySelector('#chat-input input')
    const $form    = document.getElementById('chat-input')
    const $submit  = document.querySelector('#chat-input button')
    const $picker  = document.getElementById('conversation-picker')
    const $newBtn  = document.getElementById('new-chat')
    const $tl      = document.getElementById('trace-timeline')
    const $detail  = document.getElementById('payload-detail')
    const $traceHd = document.getElementById('trace-header')
    const $popover = document.getElementById('cite-popover')
    const $audit   = document.getElementById('audit-panel')
    const $auditTitle = $audit.querySelector('.ap-title')
    const $auditBody  = $audit.querySelector('.ap-body')
    const $auditClose = $audit.querySelector('.ap-close')
    const $auditTabs   = $audit.querySelectorAll('.ap-tab')
    const $auditReplay = $audit.querySelector('.ap-replay')
    const $auditBanner = $audit.querySelector('.ap-replay-banner')
    const $auditVerdict = $audit.querySelector('.ap-verdict')

    // ─── Utilities ─────────────────────────────────────────────────────
    function esc(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;')
    }
    function setUrlContext(ctxId) {
      const url = new URL(location.href)
      if (ctxId) url.searchParams.set('context', ctxId)
      else url.searchParams.delete('context')
      history.replaceState(null, '', url.toString())
    }

    // ─── Citation parsing ──────────────────────────────────────────────
    // The sanguo-researcher agent emits citations in several shapes —
    // the prompt asks for "chapter:行号" but the model picks its own
    // syntactic frame. Observed in the wild:
    //   (引用：chapter-01-桃园三结义.txt:33)
    //   (引用：`chapter-01-桃园三结义.txt:33-34`)
    //   （引用：chapter-01-桃园三结义.txt:34）            ← fullwidth parens
    //   > **chapter-01-桃园三结义.txt:33**     殺到…    ← markdown blockquote header
    //   请看 chapter-01-桃园三结义.txt:42 这行         ← bare inline mention
    //
    // The regex anchors on the corpus file shape (chapter-NN-…txt) and
    // optionally eats the surrounding decoration: any of "(引用：…)",
    // markdown bold "**…**", backticks, or full-/half-width parens.
    // Captures: 1 = relative file path, 2 = line number ("N" or "N-M").
    const CITATION_RE = /(?:[（(]\s*引用\s*[：:]\s*)?\*{0,2}`?(chapter-[^\s`)）"<>:*]+\.txt):(\d+(?:-\d+)?)`?\*{0,2}(?:\s*[)）])?/g

    // Minimal markdown subset the agent actually emits: bold (**), inline
    // code (`), and blockquote line prefix (> ). We deliberately do NOT
    // pull in a general-purpose markdown parser because (a) the corpus
    // doesn't use heading / list / link syntax, and (b) citation markers
    // can overlap with bold syntax (e.g. **chapter-01-…txt:33**), so we
    // need tight control over substitution order. Operates on already-
    // HTML-escaped input; emits HTML.
    function renderMinimalMarkdown(escaped) {
      // Inline pass first, so bold/code also render inside headings & list items.
      let s = escaped
      // Bold (non-greedy, single-line so unmatched stars don't eat paragraphs).
      s = s.replace(/\*\*([^*\n]+?)\*\*/g, '<strong>$1</strong>')
      // Inline code (avoid crossing newlines).
      s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>')

      // Block pass: line by line. Headings (#..######), unordered (-/*) and
      // ordered (1.) list items become block elements; consecutive list items
      // group into one <ul>/<ol>. Blockquote (> , escaped to &gt;) keeps its
      // ribbon span. Bare prose lines pass through with newlines intact — the
      // .body container is white-space: pre-wrap, so prose breaks survive
      // without <p> wrapping.
      const lines = s.split('\n')
      const out = []
      let listType = null
      const closeList = () => { if (listType) { out.push('</' + listType + '>'); listType = null } }
      for (const line of lines) {
        let m
        if ((m = line.match(/^(#{1,6})\s+(.*)$/))) {
          closeList()
          const level = m[1].length
          out.push('<h' + level + ' class="md-h">' + m[2] + '</h' + level + '>')
        } else if ((m = line.match(/^[-*]\s+(.*)$/))) {
          if (listType !== 'ul') { closeList(); out.push('<ul class="md-list">'); listType = 'ul' }
          out.push('<li>' + m[1] + '</li>')
        } else if ((m = line.match(/^\d+\.\s+(.*)$/))) {
          if (listType !== 'ol') { closeList(); out.push('<ol class="md-list">'); listType = 'ol' }
          out.push('<li>' + m[1] + '</li>')
        } else if ((m = line.match(/^&gt;\s?(.*)$/))) {
          closeList()
          out.push('<span class="md-quote">' + m[1] + '</span>')
        } else {
          closeList()
          out.push(line)
        }
      }
      closeList()
      // Collapse newlines adjacent to block-level tags so pre-wrap doesn't add
      // blank lines around them; their spacing is owned by CSS margins.
      return out.join('\n').replace(/\n?(<\/?(?:h[1-6]|ul|ol|li)[^>]*>)\n?/g, '$1')
    }

    // Render the assistant body: scan for citation markers, replace each
    // with a <sup> chip, apply minimal markdown, and append a deduped
    // "sources" footer summarizing which files were cited.
    //
    // Pipeline order matters:
    //   1. Find citations and replace each with an unprintable placeholder
    //      token. This must happen BEFORE markdown processing because some
    //      citation forms (e.g. **file:line**) collide with bold syntax.
    //   2. Escape the (still placeholder-bearing) text.
    //   3. Apply markdown — placeholders are inert.
    //   4. Substitute placeholders back with the final <sup> chip HTML.
    function renderAssistantHtml(text) {
      const cites = []
      let cursor  = 0
      let buffer  = ''
      let m
      CITATION_RE.lastIndex = 0
      while ((m = CITATION_RE.exec(text)) !== null) {
        const [match, file, line] = m
        buffer += text.slice(cursor, m.index)
        const n = cites.length + 1
        cites.push({ file, line })
        //  is non-printable and never appears in plain prose; it
        // survives esc() because the regex below doesn't touch it.
        buffer += `CITE${n}`
        cursor = m.index + match.length
      }
      buffer += text.slice(cursor)

      let html = renderMinimalMarkdown(esc(buffer))
      html = html.replace(/CITE(\d+)/g, (_match, idx) => {
        const c = cites[parseInt(idx, 10) - 1]
        return `<sup class="cite" data-n="${esc(idx)}" data-file="${esc(c.file)}" data-line="${esc(c.line)}">${esc(idx)}</sup>`
      })

      let footer = ''
      if (cites.length > 0) {
        const seenFiles = new Set()
        const fileList  = []
        for (const c of cites) {
          if (!seenFiles.has(c.file)) {
            seenFiles.add(c.file)
            fileList.push(c.file)
          }
        }
        const srcChips = fileList.map(f => `<span class="src">${esc(f)}</span>`).join(' ')
        footer = `<div class="sources-footer">Sourced from ${fileList.length} file${fileList.length > 1 ? 's' : ''} · ${srcChips}</div>`
      }
      return `<div class="body">${html}</div>${footer}`
    }

    // ─── Citation popover ──────────────────────────────────────────────
    function showCitePopover(citeEl) {
      const file = citeEl.dataset.file
      const line = citeEl.dataset.line
      $popover.innerHTML =
        `<div class="cp-source">${esc(file)}</div>` +
        `<div class="cp-line">第 ${esc(line)} 行</div>` +
        `<div class="cp-hint">来源片段预览将在后续更新中提供。</div>`
      // Position below the chip, clamped to viewport.
      const rect = citeEl.getBoundingClientRect()
      $popover.classList.add('open')
      const pw = $popover.offsetWidth
      const ph = $popover.offsetHeight
      const vw = document.documentElement.clientWidth
      let left = rect.left + window.scrollX
      if (left + pw > vw - 8) left = vw - pw - 8
      if (left < 8) left = 8
      let top = rect.bottom + window.scrollY + 6
      // If popover would overflow viewport bottom, flip above the chip.
      if (rect.bottom + ph + 14 > window.innerHeight) {
        top = rect.top + window.scrollY - ph - 6
      }
      $popover.style.left = `${left}px`
      $popover.style.top  = `${top}px`
    }
    function hideCitePopover() {
      $popover.classList.remove('open')
    }
    document.addEventListener('click', (ev) => {
      const target = ev.target
      if (target instanceof HTMLElement && target.classList.contains('cite')) {
        ev.stopPropagation()
        // Re-clicking the same chip toggles closed.
        if ($popover.classList.contains('open') && $popover.dataset.anchor === target.dataset.n + ':' + target.dataset.file) {
          hideCitePopover()
          return
        }
        $popover.dataset.anchor = target.dataset.n + ':' + target.dataset.file
        showCitePopover(target)
        return
      }
      // Click outside popover dismisses it.
      if (!$popover.contains(target)) hideCitePopover()
    })
    window.addEventListener('resize', hideCitePopover)
    window.addEventListener('scroll', hideCitePopover, true)

    // ─── Audit panel ───────────────────────────────────────────────────
    // Extract citations from an assistant message DOM node — we already
    // rendered them as <sup class="cite" data-file data-line>, so reuse
    // those rather than re-running the regex.
    function citationsFromMessage(msgEl) {
      const cites = []
      msgEl.querySelectorAll('.cite').forEach(el => {
        cites.push({ file: el.dataset.file, line: el.dataset.line })
      })
      return cites
    }

    function renderSourcesTab(runId, msgEl) {
      const cites = msgEl ? citationsFromMessage(msgEl) : []
      if (cites.length === 0) {
        return `<div class="ap-empty">本回答未引用任何来源。</div>`
      }
      // Group line ranges by file, preserving first-seen order.
      const byFile = new Map()
      for (const c of cites) {
        if (!byFile.has(c.file)) byFile.set(c.file, [])
        byFile.get(c.file).push(c.line)
      }
      let html = ''
      for (const [file, lines] of byFile) {
        const lineChips = lines.map(l => `<span class="ln">行${esc(l)}</span>`).join('')
        html += `<div class="ap-source-file">
          <div class="sf-path">${esc(file)}</div>
          <div class="sf-lines">${lineChips}</div>
        </div>`
      }
      return html
    }

    // Format the "Steps" tab: filter the bucketed events for this runId
    // down to user-meaningful actions (llm.requested / tool.requested /
    // tool.responded), pair each tool.requested with its response, and
    // render them as numbered cards. Internal substrate events (clock,
    // uuid, region, boundary) are intentionally hidden — those belong
    // in dev mode's substrate inspector, not in a per-turn audit.
    function formatTokenCount(n) {
      if (n == null) return ''
      if (n >= 1000) return `${(n / 1000).toFixed(1)}k`
      return String(n)
    }

    // Render the region composition the projection already grouped by stability
    // (immutable → session-stable → turn-stable → volatile, empty groups omitted).
    // The frontend does NOT regroup or reorder — it renders the groups as given.
    // Display labels for the projection's stability enum (identifiers stay English
    // in the data; only the shown text is localized).
    const STABILITY_LABEL = {
      'immutable': '不可变', 'session-stable': '会话稳定',
      'turn-stable': '轮内稳定', 'volatile': '易变',
    }
    function stabilityLabel(s) { return STABILITY_LABEL[s] || s }
    // Display labels for chat roles and run/conversation status (data values
    // stay English; only the shown text is localized).
    const ROLE_LABEL = { user: '用户', assistant: '助手', system: '系统', tool: '工具' }
    function roleLabel(r) { return ROLE_LABEL[r] || r }
    const STATUS_LABEL = { active: '进行中', completed: '已完成', error: '出错', interrupted: '已中断' }
    function statusLabel(s) { return STATUS_LABEL[s] || s }
    function renderRegionExpander(groups) {
      if (!groups || groups.length === 0) {
        return `<div class="ap-region-empty">此处上下文中没有 region。</div>`
      }
      let html = ''
      for (const group of groups) {
        html += `<div class="ap-region-group">
          <div class="rg-title">${esc(stabilityLabel(group.stability))} · ${group.regions.length}</div>
          ${group.regions.map(r => {
            const preview = r.content ? `<span class="rr-preview">${esc(r.content)}</span>` : ''
            return `
              <div class="ap-region-row">
                <span class="rr-id">${esc(r.id)}</span>
                <span class="rr-meta">${esc(r.target)} · ${esc(r.section)} · ${esc(r.reason)}</span>
                ${preview}
              </div>
            `
          }).join('')}
        </div>`
      }
      return html
    }

    // ─── Step detail renderers ────────────────────────────────────────
    // Render one prompt message as a compact mini-card. Content might be
    // a plain string OR an array of structured blocks (text / tool_use /
    // tool_result) when the agent is mid-ReAct. We flatten to a single
    // preview string for the collapsed view; expand reveals the raw JSON.
    function renderMsgCard(msg, idx) {
      const role = String(msg.role || 'unknown')
      const previewText = flattenMessageContent(msg.content)
      const rawJson = (() => {
        try { return JSON.stringify(msg, null, 2) } catch { return String(msg) }
      })()
      const needsMore = previewText.length > 180 || rawJson.length > 240
      return `
        <div class="ap-msg-card role-${esc(role)}" data-msg-idx="${idx}">
          <span class="mc-role">${esc(role)}</span>
          <span class="mc-preview">${esc(previewText.slice(0, 600))}</span>
          ${needsMore ? `<span class="mc-more">查看原始 JSON</span>
            <pre class="ap-json mc-raw" style="display:none; margin-top:6px">${esc(rawJson)}</pre>` : ''}
        </div>`
    }

    function flattenMessageContent(content) {
      if (content == null) return ''
      if (typeof content === 'string') return content
      if (Array.isArray(content)) {
        return content.map(b => {
          if (b == null) return ''
          if (typeof b === 'string') return b
          if (b.type === 'text')        return b.text || ''
          if (b.type === 'tool_use')    return `[tool_use ${b.name || '?'} ${truncateJson(b.input ?? {}, 80)}]`
          if (b.type === 'tool_result') {
            const r = typeof b.content === 'string' ? b.content : truncateJson(b.content ?? '', 120)
            return `[tool_result ${b.tool_use_id ? b.tool_use_id.slice(0, 8) + '…' : ''}: ${r}]`
          }
          return `[${b.type || 'block'}]`
        }).join('\n')
      }
      return JSON.stringify(content)
    }

    function jsonBlock(value) {
      if (value === undefined) return `<pre class="ap-json empty">undefined</pre>`
      let s
      try { s = JSON.stringify(value, null, 2) } catch { s = String(value) }
      if (s === '' || s === '""') return `<pre class="ap-json empty">空</pre>`
      return `<pre class="ap-json">${esc(s)}</pre>`
    }

    function renderLLMDetails(card) {
      if (!card.prompt && !card.response) {
        return `<div class="ap-empty">未记录请求 / 响应载荷。</div>`
      }
      let html = ''
      if (card.prompt) {
        const sys = card.prompt.system
        const msgs = card.prompt.messages || []
        const tools = card.prompt.tools || []
        if (sys) {
          html += `<div class="ap-sub">
            <div class="ap-sub-title">System（${(typeof sys === 'string' ? sys.length : JSON.stringify(sys).length)} 字符）</div>
            <pre class="ap-json">${esc(typeof sys === 'string' ? sys : JSON.stringify(sys, null, 2))}</pre>
          </div>`
        }
        html += `<div class="ap-sub">
          <div class="ap-sub-title">消息（${msgs.length}）</div>
          ${msgs.length === 0
            ? `<pre class="ap-json empty">无</pre>`
            : msgs.map((m, i) => renderMsgCard(m, i)).join('')}
        </div>`
        if (tools.length > 0) {
          const names = tools.map(t => t.name || '?').join(', ')
          html += `<div class="ap-sub">
            <div class="ap-sub-title">工具（${tools.length}）</div>
            <pre class="ap-json">${esc(names)}</pre>
          </div>`
        }
      }
      if (card.response) {
        const r = card.response
        const text = (Array.isArray(r.content) ? r.content : [])
          .filter(b => b && b.type === 'text').map(b => b.text || '').join('\n').trim()
        const toolUses = (r.toolCalls || []).map(tc => `${tc.name}(${truncateJson(tc.input ?? {}, 120)})`).join('\n')
        html += `<div class="ap-sub">
          <div class="ap-sub-title">响应 · 文本</div>
          ${text ? `<pre class="ap-json">${esc(text)}</pre>` : `<pre class="ap-json empty">无文本内容</pre>`}
        </div>`
        if (toolUses) {
          html += `<div class="ap-sub">
            <div class="ap-sub-title">响应 · 工具调用</div>
            <pre class="ap-json">${esc(toolUses)}</pre>
          </div>`
        }
      }
      return html
    }

    function renderToolDetails(card) {
      let html = ''
      html += `<div class="ap-sub">
        <div class="ap-sub-title">输入</div>
        ${jsonBlock(card.input)}
      </div>`
      if (card.error) {
        html += `<div class="ap-sub">
          <div class="ap-sub-title">错误</div>
          ${jsonBlock(card.error)}
        </div>`
      } else {
        html += `<div class="ap-sub">
          <div class="ap-sub-title">输出</div>
          ${jsonBlock(card.output)}
        </div>`
      }
      return html
    }

    // Execution tab is a PURE PROJECTION over the core buildExecutionProjection
    // (served at GET /run/:runId/execution). The frontend does NO event parsing
    // or attribution: cache tiering, region grouping by stability, and tool
    // pairing all live in the core projection (守 ARCHITECTURE.md「UI =
    // projection over CLI/SDK,前端不自带归因逻辑」). We only render the JSON.
    async function renderStepsTab(runId) {
      let steps
      try {
        const res = await fetch(`/run/${encodeURIComponent(runId)}/execution`)
        if (!res.ok) return `<div class="ap-empty">本轮还没有记录的执行步骤。</div>`
        steps = (await res.json()).steps || []
      } catch {
        return `<div class="ap-empty">加载执行步骤失败。</div>`
      }
      if (steps.length === 0) {
        return `<div class="ap-empty">本轮还没有记录的执行步骤。</div>`
      }
      return steps.map((s, i) => {
        // Badge surfaces both read AND creation so a "0% hit but cache was just
        // written" call is visibly different from a "no cache at all" call. The
        // tier (hot/warm/cold) comes from the projection — not computed here.
        let cacheBadge = ''
        if (s.cacheHealth) {
          const c = s.cacheHealth
          const read    = c.readTokens     || 0
          const created = c.creationTokens || 0
          const total   = c.totalInputTokens || 0
          const hitPct  = Math.round((c.hitRate || 0) * 100)
          const tierClass = c.tier === 'cold' ? 'cold' : c.tier === 'warm' ? 'warm' : ''
          let text
          if (read > 0) {
            text = `命中 ${hitPct}% · ${formatTokenCount(read)}/${formatTokenCount(total)} token`
          } else if (created > 0) {
            text = `写入缓存 ${formatTokenCount(created)} · ${formatTokenCount(total)} token`
          } else {
            text = `无缓存 · ${formatTokenCount(total)} token`
          }
          cacheBadge = `<span class="ap-step-cache ${tierClass}" title="读取 ${read} · 写入 ${created} · 合计 ${total}">${text}</span>`
        }

        let body = '', meta = '', expander = '', details = ''
        if (s.kind === 'llm') {
          const n = s.messageCount
          body = n != null
            ? `向模型发送了 <code>${n}</code> 条消息`
            : '向模型发送了 prompt'
          const groups = s.regionGroups || []
          const regionCount = groups.reduce((acc, g) => acc + g.regions.length, 0)
          expander = `<div class="ap-step-expand" data-step-idx="${i}">上下文中 ${regionCount} 个 region</div>
             <div class="ap-step-expanded">${renderRegionExpander(groups)}</div>`
          details = `<details class="ap-step-details"><summary>Prompt 与响应</summary>${renderLLMDetails({ prompt: s.prompt, response: s.response })}</details>`
        } else {
          const t = s.tool || {}
          const inputPreview = t.input ? truncateJson(t.input, 120) : ''
          body = inputPreview ? `<code>${esc(inputPreview)}</code>` : ''
          meta = t.status === 'pending' ? '→ 等待中'
               : t.status === 'error'   ? '→ 出错'
               : `→ 成功 (${describeToolResult(t.output)})`
          details = `<details class="ap-step-details"><summary>完整输入与输出</summary>${renderToolDetails({ input: t.input, output: t.output, error: t.error })}</details>`
        }
        return `
          <div class="ap-step kind-${s.kind}" data-step-idx="${i}">
            <div class="ap-step-num">${i + 1}</div>
            <div class="ap-step-headerline">
              <div class="ap-step-kind">${esc(s.label)}</div>
              ${cacheBadge}
            </div>
            <div class="ap-step-body">${body}</div>
            ${meta ? `<div class="ap-step-meta">${esc(meta)}</div>` : ''}
            ${expander}
            ${details}
          </div>
        `
      }).join('')
    }

    function truncateJson(value, max) {
      let s
      try { s = JSON.stringify(value) } catch { s = String(value) }
      return s.length > max ? s.slice(0, max - 1) + '…' : s
    }

    function describeToolResult(output) {
      if (output == null) return '无输出'
      if (typeof output === 'string') return `${output.length} 字符`
      if (Array.isArray(output)) return `数组 · ${output.length} 项`
      if (typeof output === 'object') {
        // Common tool-output shapes: {entries: [...]}, {content: "..."},
        // {matches: [...]}, {hits: [...]}. Report the principal array
        // length where it exists, else fall back to JSON byte size.
        for (const k of ['entries', 'matches', 'hits', 'results']) {
          if (Array.isArray(output[k])) return `${output[k].length} 条 ${k}`
        }
        if (typeof output.content === 'string') return `${output.content.length} 字符`
        let bytes
        try { bytes = JSON.stringify(output).length } catch { bytes = 0 }
        return `${bytes} 字节`
      }
      return String(output).slice(0, 40)
    }

    // ─── Provenance ────────────────────────────────────────────────────
    // Split the answer into paragraph segments and pull out the citation
    // markers in each. The segment "text" is the paragraph with citation
    // markers stripped, so the comparison against source content is
    // against the prose only (citation markers are formatting noise).
    // Strip markdown markers so a provenance segment reads as clean prose.
    // The corpus has no markdown, so removing #/-/1./> and **/` also keeps
    // verbatim-substring matching (classifySegment) from being defeated by
    // formatting noise. Quote extraction uses seg.raw, so it's unaffected.
    function stripMarkdownMarkers(s) {
      return s.split('\n')
        .map(line => line.replace(/^\s*(?:#{1,6}\s+|[-*]\s+|\d+\.\s+|>\s?)/, ''))
        .join('\n')
        .replace(/\*\*([^*\n]+?)\*\*/g, '$1')
        .replace(/`([^`\n]+)`/g, '$1')
        .trim()
    }

    function segmentAnswer(text) {
      const paragraphs = text.split(/\n\n+/).map(p => p.trim()).filter(Boolean)
      return paragraphs.map(p => {
        const cites = []
        const stripped = p.replace(CITATION_RE, (_match, file, line) => {
          cites.push({ file, line })
          return ''
        }).trim()
        return { text: stripMarkdownMarkers(stripped), raw: p, citations: cites }
      })
    }

    // Extract verbatim quoted snippets from a segment. The agent wraps
    // direct quotes in any of: straight " ", Chinese curly “ ”
    // (U+201C/U+201D), Chinese corner 「 」 (U+300C/U+300D), or Chinese
    // double corner 『 』 (U+300E/U+300F). The negated set inside the
    // capture group lists all of these so a greedy match stops at the
    // first closing quote of any flavor.
    function extractQuotedSnippets(text) {
      const QUOTE_CHARS = '"“”「」『』'
      const re = new RegExp(`[${QUOTE_CHARS}]([^${QUOTE_CHARS}]+)[${QUOTE_CHARS}]`, 'g')
      const out = []
      let m
      while ((m = re.exec(text)) !== null) {
        if (m[1].trim().length > 0) out.push(m[1].trim())
      }
      return out
    }

    // LLM-emitted citation line numbers are often off by 1-2 lines —
    // models eyeball line counts from tool output and round, or pick the
    // line containing the chapter break rather than the line containing
    // the prose. To make Provenance verification robust to this, we
    // widen every cited range by ±2 lines before fetching. Display still
    // shows the agent's original line numbers.
    const LINE_TOLERANCE = 2
    function expandedLineRange(line) {
      const m = line.match(/^(\d+)(?:-(\d+))?$/)
      if (!m) return line
      const start = Math.max(1, parseInt(m[1], 10) - LINE_TOLERANCE)
      const end   = (m[2] ? parseInt(m[2], 10) : parseInt(m[1], 10)) + LINE_TOLERANCE
      return `${start}-${end}`
    }
    function verifyCacheKey(file, line) {
      return `${file}::${expandedLineRange(line)}`
    }

    async function fetchVerifySlice(file, line) {
      const key = verifyCacheKey(file, line)
      if (sourceCache.has(key)) return sourceCache.get(key)
      const expanded = expandedLineRange(line)
      try {
        const r = await fetch(`/source/${encodeURIComponent(file)}?lines=${encodeURIComponent(expanded)}`)
        if (r.status !== 200) {
          sourceCache.set(key, null)
          return null
        }
        const j = await r.json()
        sourceCache.set(key, j)
        return j
      } catch {
        sourceCache.set(key, null)
        return null
      }
    }

    // Fetch a cited file in full (no lines query → server returns whole file).
    // Used as the fallback when a quote is absent from the cited line slice:
    // if it exists anywhere in the file, the line number is wrong, not the
    // quote. Cached under a distinct key so it coexists with line slices.
    async function fetchSourceFull(file) {
      const key = `${file}::__full__`
      if (sourceCache.has(key)) return sourceCache.get(key)
      try {
        const r = await fetch(`/source/${encodeURIComponent(file)}`)
        if (r.status !== 200) { sourceCache.set(key, null); return null }
        const j = await r.json()
        sourceCache.set(key, j)
        return j
      } catch {
        sourceCache.set(key, null)
        return null
      }
    }

    // Substring match between a segment and its source. Catches the
    // "verbatim copy without quote wrappers" case — e.g. when the agent
    // pastes a passage into a markdown blockquote (`> …`) or just inlines
    // it bare. Markdown formatting chars are stripped before comparison
    // since the source corpus has none of them.
    // Traditional/simplified normalizer for provenance matching. The corpus is
    // traditional; the model may quote in either script. Normalizing both sides
    // to simplified before comparison turns a 繁/简 字形 difference into a match
    // instead of a false "not found". Degrades to identity if the OpenCC bundle
    // didn't load (matching reverts to the pre-fix exact comparison).
    const _t2s = (typeof OpenCC !== 'undefined' && OpenCC.Converter)
      ? OpenCC.Converter({ from: 't', to: 'cn' })
      : (s => s)
    // Also strip whitespace (incl. \n and 全角空格 U+3000): the model often
    // merges a quote spanning several source lines into one run, dropping the
    // line breaks the corpus has between them. Comparing 字-only turns that
    // into a match — for 引文核对 a quote means the characters, not the layout.
    function normForMatch(s) {
      try { return _t2s(s).replace(/[\s　]/g, '') }
      catch { return s.replace(/[\s　]/g, '') }
    }

    const SUBSTRING_MIN_LEN = 20
    function hasVerbatimSubstring(segText, sourceText) {
      const strip = s => normForMatch(s.replace(/[*`>]/g, ''))
      const seg = strip(segText)
      const src = strip(sourceText)
      if (seg.length < SUBSTRING_MIN_LEN) return false
      for (let i = 0; i + SUBSTRING_MIN_LEN <= seg.length; i++) {
        if (src.includes(seg.slice(i, i + SUBSTRING_MIN_LEN))) return true
      }
      return false
    }

    // Decide a segment's provenance state from its citations and the
    // (already-fetched) source slices. Rules in priority order:
    //   1. No citation → unsupported (red).
    //   2. Citation but every source fetch failed → unverified (gray).
    //   3. Citation + explicit quoted snippets (curly/corner quotes):
    //        all snippets in source → supported (green)
    //        any snippet absent → tenuous (orange, possible hallucination)
    //   4. Citation + a ≥20-char contiguous substring of source appears
    //      in the segment (verbatim copy without quote wrappers, e.g.
    //      a markdown blockquote header followed by pasted text) →
    //      supported (green).
    //   5. Otherwise (citation, summary in own words) → paraphrased (yellow).
    function classifySegment(seg, sourceSlices, fullTexts) {
      if (seg.citations.length === 0) return { state: 'unsupported' }
      const okSlices = sourceSlices.filter(s => s != null)
      if (okSlices.length === 0) return { state: 'unverified' }
      const allSrc = okSlices.map(s => s.content).join('\n')

      const quotes = extractQuotedSnippets(seg.raw)
      if (quotes.length > 0) {
        // Normalize 繁/简 on both sides before matching (corpus is traditional;
        // the model may quote in simplified). The arrays keep the ORIGINAL
        // quote text for display — only the comparison is normalized.
        const allSrcN = normForMatch(allSrc)
        const notInSlice = quotes.filter(q => !allSrcN.includes(normForMatch(q)))
        if (notInSlice.length === 0) return { state: 'supported', quotes }
        // Some quotes aren't at the cited lines. Before flagging a possible
        // hallucination, check the FULL text of the cited files — models often
        // get the quote verbatim right but the line number wrong (the same
        // off-by-N that LINE_TOLERANCE only partly covers). A quote that lives
        // in the cited file but not at the cited line is misattribution, not
        // fabrication; only a quote absent from the whole file is tenuous.
        const allFullN = normForMatch((fullTexts || []).filter(t => t != null).map(t => t.content).join('\n'))
        const trulyMissing = notInSlice.filter(q => !allFullN.includes(normForMatch(q)))
        if (trulyMissing.length > 0) return { state: 'tenuous', quotes, missingQuotes: trulyMissing }
        return { state: 'misattributed', quotes, misattributedQuotes: notInSlice }
      }

      if (hasVerbatimSubstring(seg.text, allSrc)) {
        return { state: 'supported' }
      }
      return { state: 'paraphrased' }
    }

    const STATE_LABELS = {
      supported:     '有来源直接支撑',
      paraphrased:   '引用转述（无逐字引文）',
      misattributed: '引文属实，但标注行号不符',
      tenuous:       '引文在来源中未找到——需核实',
      unsupported:   '无来源引用——模型生成',
      unverified:    '已引用但来源无法获取',
    }

    async function renderProvenanceTab(runId) {
      const text = assistantTextByRunId.get(runId)
      if (!text) return `<div class="ap-empty">答案文本不可用。</div>`
      const segments = segmentAnswer(text)
      if (segments.length === 0) return `<div class="ap-empty">答案为空。</div>`

      // Resolve all unique (file, line) pairs in parallel, populating
      // sourceCache as a side effect. Subsequent renders are zero-fetch.
      // We dedupe across the expanded line ranges so two adjacent
      // citations (e.g. :33 and :33-34) hit the server only once each
      // after tolerance expansion.
      const toFetch = []
      const seen    = new Set()
      for (const s of segments) {
        for (const c of s.citations) {
          const k = verifyCacheKey(c.file, c.line)
          if (seen.has(k)) continue
          seen.add(k)
          toFetch.push([c.file, c.line])
        }
      }
      await Promise.all(toFetch.map(([file, line]) => fetchVerifySlice(file, line)))

      // Also fetch each cited file in full, for the misattribution fallback in
      // classifySegment (quote present in the file but not at the cited line).
      const citedFiles = [...new Set(segments.flatMap(s => s.citations.map(c => c.file)))]
      await Promise.all(citedFiles.map(f => fetchSourceFull(f)))

      const legend = `
        <div class="ap-prov-legend">
          <span class="lg-dot s-supported"></span>有支撑
          <span class="lg-dot s-paraphrased"></span>转述
          <span class="lg-dot s-misattributed"></span>行号不符
          <span class="lg-dot s-tenuous"></span>存疑
          <span class="lg-dot s-unsupported"></span>无来源
          <span class="lg-dot s-unverified"></span>未核实
        </div>`

      const segHtml = segments.map(seg => {
        const slices = seg.citations.map(c => sourceCache.get(verifyCacheKey(c.file, c.line)))
        const segFiles = [...new Set(seg.citations.map(c => c.file))]
        const fulls = segFiles.map(f => sourceCache.get(`${f}::__full__`))
        const klass = classifySegment(seg, slices, fulls)
        const label = STATE_LABELS[klass.state]
        const citeMeta = seg.citations.length > 0
          ? seg.citations.map(c => `${c.file}:${c.line}`).join(' · ')
          : ''
        let quoteBlock = ''
        if (klass.state === 'supported' && klass.quotes && klass.quotes.length > 0) {
          quoteBlock = `<span class="ap-seg-quote">${esc(klass.quotes.join('\n'))}</span>`
        } else if (klass.state === 'misattributed' && klass.misattributedQuotes && klass.misattributedQuotes.length > 0) {
          quoteBlock = `<span class="ap-seg-quote">引文属实，但不在标注行（已在引用文件中找到）：\n${esc(klass.misattributedQuotes.join('\n'))}</span>`
        } else if (klass.state === 'tenuous' && klass.missingQuotes && klass.missingQuotes.length > 0) {
          quoteBlock = `<span class="ap-seg-quote">来源中缺失：\n${esc(klass.missingQuotes.join('\n'))}</span>`
        }
        return `
          <div class="ap-seg s-${klass.state}">
            <span class="ap-seg-text">${esc(seg.text)}</span>
            <span class="ap-seg-label">${esc(label)}</span>
            ${citeMeta ? `<span class="ap-seg-meta">${esc(citeMeta)}</span>` : ''}
            ${quoteBlock}
          </div>`
      }).join('')

      return legend + segHtml
    }

    // Find the user input that started this run, so the audit panel can
    // show which question it's auditing. Run-started is always the first
    // event for a runId.
    function userInputForRun(runId) {
      const events = eventsByRunId.get(runId) || []
      for (const e of events) {
        if (e.type === 'agent.run.started' && e.payload && e.payload.input) {
          return String(e.payload.input)
        }
      }
      return null
    }

    function updateAuditTitle() {
      const q = auditAnchorRunId ? userInputForRun(auditAnchorRunId) : null
      $auditTitle.innerHTML = q
        ? `这个答案是怎么来的<span class="ap-title-q" title="${esc(q)}">${esc(q)}</span>`
        : `这个答案是怎么来的`
    }

    function renderAuditBody() {
      if (!auditAnchorRunId) { $auditBody.innerHTML = ''; return }
      const msgEl = $log.querySelector(`.msg.assistant[data-run-id="${auditAnchorRunId}"]`)
      $auditBody.classList.toggle('viewer', auditActiveTab === 'why')
      if (auditActiveTab === 'sources') {
        $auditBody.innerHTML = renderSourcesTab(auditAnchorRunId, msgEl)
      } else if (auditActiveTab === 'steps') {
        $auditBody.innerHTML = `<div class="ap-empty">正在加载执行步骤…</div>`
        // Async render: the steps come from the core projection endpoint.
        // Capture runId/tab so a fast tab switch doesn't paint stale results.
        const pendingRunId = auditAnchorRunId
        const pendingTab   = auditActiveTab
        renderStepsTab(auditAnchorRunId).then(html => {
          if (auditAnchorRunId === pendingRunId && auditActiveTab === pendingTab) {
            $auditBody.innerHTML = html
            // A firstBreak chip asked to jump here — flash the target step row.
            if (pendingStepFlash != null) {
              const el = $auditBody.querySelector(`.ap-step[data-step-idx="${pendingStepFlash}"]`)
              if (el) { el.scrollIntoView({ block: 'center' }); el.classList.add('flash') }
              pendingStepFlash = null
            }
          }
        })
      } else if (auditActiveTab === 'why') {
        // Reuse the core #64 decision viewer wholesale: it is a self-contained
        // HTML document (own CSS + drill-down JS), so an iframe isolates it and
        // its "two clicks to root cause" interactions run inside the frame.
        $auditBody.innerHTML =
          `<iframe class="ap-viewer-frame" src="/run/${encodeURIComponent(auditAnchorRunId)}/viewer"></iframe>`
      } else if (auditActiveTab === 'provenance') {
        $auditBody.innerHTML = `<div class="ap-empty">正在比对答案与来源…</div>`
        // Async render: classifies each segment after fetching its source.
        // Capture runId so a fast tab switch doesn't paint stale results
        // over a panel that has since changed anchor.
        const pendingRunId = auditAnchorRunId
        const pendingTab   = auditActiveTab
        renderProvenanceTab(auditAnchorRunId).then(html => {
          if (auditAnchorRunId === pendingRunId && auditActiveTab === pendingTab) {
            $auditBody.innerHTML = html
          }
        })
      }
    }

    function openAudit(runId) {
      // Re-click on the same anchor closes the panel — natural toggle.
      if (auditAnchorRunId === runId && $audit.classList.contains('open')) {
        closeAudit()
        return
      }
      // Switching to a different run's audit invalidates the prior replay
      // banner (it pertains to the previous run). The diagnosis verdict is
      // keyed by runId and repainted below, so it follows the run rather than
      // being cleared.
      if (auditAnchorRunId !== runId) hideReplayBanner()
      auditAnchorRunId = runId
      $audit.classList.add('open')
      document.body.classList.add('audit-open')
      updateAuditTitle()
      renderVerdict()
      // Restore last active tab across openings; never land on a disabled tab.
      setAuditTab(auditActiveTab || 'sources')
    }

    function closeAudit() {
      auditAnchorRunId = null
      $audit.classList.remove('open')
      document.body.classList.remove('audit-open')
      hideReplayBanner()
      renderVerdict()   // anchor is null → clears & hides the verdict strip
    }

    // ─── Replay (Phase 4b) ────────────────────────────────────────────
    function hideReplayBanner() {
      $auditBanner.className = 'ap-replay-banner'
      $auditBanner.innerHTML = ''
    }

    function showReplayBanner(state, html) {
      $auditBanner.className = `ap-replay-banner shown ${state}`
      $auditBanner.innerHTML = html + `<button class="rb-close" aria-label="关闭">×</button>`
    }

    function fmtCachePct(read, total) {
      if (!total) return '0%'
      return `${Math.round(100 * read / total)}%`
    }

    function renderReplayResult(result) {
      if (result.status === 'deterministic') {
        const cs = result.originalCacheStats || { readTokens: 0, creationTokens: 0, totalInputTokens: 0 }
        const sav = fmtCachePct(cs.readTokens, cs.totalInputTokens)
        const matches = result.matchesOriginal
        const title = matches
          ? '✓ 逐字节一致重放'
          : '✓ 重放完成（输出有差异）'
        const detail = matches
          ? `从记录的 trace 重跑这一轮，得到了与原答案逐字符相同的结果。全部 ${cs.totalInputTokens} 个输入 token 都由本地缓存供给——零次新模型调用。`
          : `重放未发生偏离，但最终文本与原答案不同。这种情况罕见，提示 IOPort 之外存在下游非确定性（如格式化代码里的随机采样）。`
        const meta = cs.totalInputTokens
          ? `原始这一轮：${formatTokenCount(cs.totalInputTokens)} 个输入 token · 其中 ${sav} 为缓存命中读取 · ${formatTokenCount(cs.creationTokens)} 写入缓存。`
          : `原始这一轮：provider 未上报缓存统计。`
        showReplayBanner('deterministic',
          `<div class="rb-title">${esc(title)}</div>` +
          `<div class="rb-detail">${esc(detail)}</div>` +
          `<div class="rb-meta">${esc(meta)}</div>`)
      } else if (result.status === 'divergent') {
        showReplayBanner('divergent',
          `<div class="rb-title">⚠ 重放在 ${esc(result.kind)} 处偏离</div>` +
          `<div class="rb-detail">${esc(result.summary || '无详情。')}</div>` +
          (result.actualHashPrefix
            ? `<div class="rb-meta">未预期的 ${esc(result.kind)} 调用：hash ${esc(result.actualHashPrefix)}…（缓存有 ${result.availableCount} 个候选）</div>`
            : ''))
      } else {
        showReplayBanner('error',
          `<div class="rb-title">重放失败</div>` +
          `<div class="rb-detail">${esc(result.message || '未知错误')}</div>`)
      }
    }

    async function runReplay() {
      if (!auditAnchorRunId) return
      $auditReplay.disabled = true
      const originalLabel = $auditReplay.textContent
      $auditReplay.textContent = '重放中…'
      hideReplayBanner()
      try {
        const resp = await fetch(`/run/${encodeURIComponent(auditAnchorRunId)}/replay`, { method: 'POST' })
        const data = await resp.json()
        renderReplayResult(data)
      } catch (err) {
        renderReplayResult({ status: 'error', message: (err && err.message) || String(err) })
      } finally {
        $auditReplay.disabled = false
        $auditReplay.textContent = originalLabel
      }
    }

    $auditReplay.addEventListener('click', runReplay)
    $auditBanner.addEventListener('click', (ev) => {
      const t = ev.target
      if (t instanceof HTMLElement && t.classList.contains('rb-close')) hideReplayBanner()
    })

    // ─── Diagnose verdict strip (#98) ─────────────────────────────────
    // The verdict (是否答到问题上) is a conclusion that sits above the evidence
    // (the tabs). Results are cached per runId so switching away and back keeps
    // the verdict; a suspect's firstBreak.step (0-based index into the Execution
    // projection) is a chip that jumps to & flashes that row in the Execution tab.
    const diagnosisByRun = new Map()   // runId → diagnose response (or {error})
    let pendingStepFlash = null        // step idx to highlight after Execution paints

    function renderVerdict() {
      if (!auditAnchorRunId) { $auditVerdict.className = 'ap-verdict'; $auditVerdict.innerHTML = ''; return }
      const data = diagnosisByRun.get(auditAnchorRunId)
      const runBtn = (label) => `<button class="vd-run">${esc(label)}</button>`

      // Not yet diagnosed this run.
      if (!data) {
        $auditVerdict.className = 'ap-verdict shown'
        $auditVerdict.innerHTML =
          `<div class="vd-row"><span class="vd-label">⚖ 诊断</span>` +
          `<span class="vd-summary">判断答案是否答到问题上</span>${runBtn('诊断')}</div>`
        return
      }
      // In-flight.
      if (data.pending) {
        $auditVerdict.className = 'ap-verdict shown'
        $auditVerdict.innerHTML =
          `<div class="vd-row"><span class="vd-label">⚖ 诊断</span>` +
          `<span class="vd-summary">诊断中…</span>` +
          `<button class="vd-run" disabled>诊断中…</button></div>`
        return
      }

      let state, summary, detailInner
      if (data.error === 'unparseable') {
        state = 'error'; summary = '诊断输出无法解析'
        detailInner = esc(data.raw || '')
      } else if (data.error) {
        state = 'error'; summary = '诊断失败'
        detailInner = esc(data.error)
      } else if (data.verdict === 'ok') {
        state = 'ok'; summary = '✓ 答案与问题相关'
        detailInner = esc(data.explanation || '')
      } else {
        state = 'suspect'; summary = '⚠ 检出跑偏（suspect）'
        const fb = data.firstBreak || {}
        const stepChip = Number.isInteger(fb.step)
          ? `<button class="vd-jump" data-step-idx="${fb.step}" title="跳到 Execution 第 ${fb.step} 步">步 ${fb.step}</button>`
          : `<span>${esc(String(fb.step ?? '?'))}</span>`
        detailInner =
          `<div class="vd-break"><b>断点</b> ${stepChip} · ${esc(fb.what || '')}</div>` +
          `<div class="vd-break"><b>原因</b> ${esc(fb.why || '')}</div>` +
          (data.explanation ? `<div class="vd-break">${esc(data.explanation)}</div>` : '')
      }
      // Collapse state persists per run: default collapsed for ok/error, expanded
      // for suspect; a manual toggle (stored on the entry) survives repaints.
      const collapsed = data._collapsed != null ? data._collapsed : (state !== 'suspect')
      $auditVerdict.className = `ap-verdict shown ${state}`
      $auditVerdict.innerHTML =
        `<div class="vd-row"><span class="vd-label">⚖ 诊断</span>` +
        `<span class="vd-summary toggle" title="点开/收起详情">${esc(summary)}</span>${runBtn('重新诊断')}</div>` +
        `<div class="vd-detail${collapsed ? ' collapsed' : ''}">${detailInner}</div>`
    }

    async function runDiagnose() {
      const runId = auditAnchorRunId
      if (!runId) return
      diagnosisByRun.set(runId, { pending: true })
      if (auditAnchorRunId === runId) renderVerdict()
      let result
      try {
        const resp = await fetch(`/run/${encodeURIComponent(runId)}/diagnose`, { method: 'POST' })
        result = await resp.json()
      } catch (err) {
        result = { error: (err && err.message) || String(err) }
      }
      diagnosisByRun.set(runId, result)
      if (auditAnchorRunId === runId) renderVerdict()
    }

    function jumpToStep(idx) {
      pendingStepFlash = idx
      setAuditTab('steps')
    }

    $auditVerdict.addEventListener('click', (ev) => {
      const t = ev.target
      if (!(t instanceof HTMLElement)) return
      // stopPropagation: runDiagnose() synchronously calls renderVerdict(),
      // which rewrites $auditVerdict.innerHTML — destroying this very button.
      // Without this, the click bubbles to the document outside-click handler
      // (below), where $audit.contains(detachedTarget) is false and the panel
      // self-closes. See also the document.contains guard in that handler.
      if (t.classList.contains('vd-run')) { ev.stopPropagation(); runDiagnose(); return }
      if (t.classList.contains('vd-jump')) { jumpToStep(Number(t.dataset.stepIdx)); return }
      const summary = t.closest('.vd-summary.toggle')
      if (summary) {
        const detail = $auditVerdict.querySelector('.vd-detail')
        if (detail) {
          const collapsed = detail.classList.toggle('collapsed')
          // Persist on the entry so a repaint (re-open / switch back) keeps it.
          const entry = diagnosisByRun.get(auditAnchorRunId)
          if (entry) entry._collapsed = collapsed
        }
      }
    })

    function setAuditTab(name) {
      // Any tab switch that isn't the firstBreak jump cancels a pending flash,
      // so a stale highlight can never surface on a later visit to Execution.
      if (name !== 'steps') pendingStepFlash = null
      auditActiveTab = name
      $auditTabs.forEach(t => {
        if (t.classList.contains('disabled')) return
        t.classList.toggle('active', t.dataset.tab === name)
      })
      renderAuditBody()
    }

    $auditClose.addEventListener('click', closeAudit)
    $auditTabs.forEach(t => {
      t.addEventListener('click', () => {
        if (t.classList.contains('disabled')) return
        setAuditTab(t.dataset.tab)
      })
    })
    // Steps tab: click delegation for two expanders.
    //   - "N regions in context" → toggle the per-card region snapshot
    //   - "Show raw JSON" inside a prompt message mini-card → toggle the
    //     raw JSON pre under that one message
    $auditBody.addEventListener('click', (ev) => {
      const target = ev.target
      if (!(target instanceof HTMLElement)) return
      if (target.classList.contains('ap-step-expand')) {
        const card = target.closest('.ap-step')
        if (card) card.classList.toggle('expanded')
        return
      }
      if (target.classList.contains('mc-more')) {
        const msgCard = target.closest('.ap-msg-card')
        if (!msgCard) return
        const rawPre = msgCard.querySelector('.mc-raw')
        if (!rawPre) return
        const opening = rawPre.style.display === 'none'
        rawPre.style.display = opening ? 'block' : 'none'
        target.textContent = opening ? '收起原始 JSON' : '查看原始 JSON'
        return
      }
    })
    // Click on "View audit ▾" trigger inside any assistant message.
    $log.addEventListener('click', (ev) => {
      const target = ev.target
      if (target instanceof HTMLElement && target.classList.contains('audit-trigger')) {
        ev.stopPropagation()
        const runId = target.dataset.runId
        if (runId) openAudit(runId)
      }
    })
    // Esc closes the panel.
    document.addEventListener('keydown', (ev) => {
      if (ev.key === 'Escape' && $audit.classList.contains('open')) closeAudit()
    })
    // Click outside the panel and outside any audit-trigger dismisses it.
    document.addEventListener('click', (ev) => {
      if (!$audit.classList.contains('open')) return
      const target = ev.target
      if (!(target instanceof HTMLElement)) return
      // A target that was synchronously detached from the document before this
      // handler ran (e.g. a button replaced by an innerHTML rewrite during its
      // own click) is not an "outside" click — ignore it so the panel doesn't
      // self-close. Without this, $audit.contains(detached) is false → close.
      if (!document.contains(target)) return
      if ($audit.contains(target)) return
      if (target.classList.contains('audit-trigger')) return
      if (target.classList.contains('cite')) return
      closeAudit()
    })

    // ─── Conversation picker ───────────────────────────────────────────
    async function refreshPicker() {
      const res = await fetch('/conversations')
      const data = await res.json()
      $picker.innerHTML = '<option value="">(new conversation)</option>'
      for (const c of data.conversations) {
        const opt = document.createElement('option')
        opt.value = c.contextId
        opt.textContent = `${c.contextId.slice(0, 8)}… · ${statusLabel(c.status)} · ${c.runIds.length} 轮`
        $picker.appendChild(opt)
      }
      $picker.value = currentContextId ?? ''
    }
    $picker.addEventListener('change', () => {
      const v = $picker.value
      currentContextId = v || null
      setUrlContext(currentContextId)
      if (currentContextId) loadConversation(currentContextId)
      else resetUI()
    })
    $newBtn.addEventListener('click', () => {
      currentContextId = null
      setUrlContext(null)
      $picker.value = ''
      resetUI()
    })

    // ─── UI reset ──────────────────────────────────────────────────────
    function resetUI() {
      $log.innerHTML = ''
      $tl.innerHTML = ''
      $detail.innerHTML = ''
      $input.disabled = false
      $submit.disabled = false
      $input.placeholder = '问《三国演义》相关问题...'
      $traceHd.textContent = 'Trace 时间线（新对话——发送消息开始）'
      if (eventSource) { eventSource.close(); eventSource = null }
      seenEventIds = new Set()
      eventsByRunId = new Map()
      assistantTextByRunId.clear()
      sourceCache.clear()
      hideCitePopover()
      closeAudit()
      removePendingBubble()
    }

    // ─── Render an event into trace timeline (dev mode only matters) ───
    // Returns true if the event was newly rendered, false if it was
